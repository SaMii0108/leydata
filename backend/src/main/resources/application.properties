spring.application.name=backend

# CONFIGURACIÓN DE BASE DE DATOS
spring.datasource.url=jdbc:postgresql://localhost:5433/leydata_db
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASS}

# CONFIGURACIÓN DE HIBERNATE
# 'update' actualiza la tabla si hay cambios, pero NO borra tus datos.
spring.jpa.hibernate.ddl-auto=create-drop
# 'true' te permite ver las consultas en la terminal (súper útil para el desarrollo)
spring.jpa.show-sql=true 
# Le dice a Spring el "idioma" exacto que habla tu base de datos
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# CONFIGURACIÓN DE SEGURIDAD (JWT)
application.security.jwt.secret=changeit-changeit-changeit-changeit-changeit-changeit
application.security.jwt.expiration-ms=86400000